services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thundergate
      POSTGRES_PASSWORD: thundergate
      POSTGRES_DB: thundergate
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thundergate -d thundergate']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
